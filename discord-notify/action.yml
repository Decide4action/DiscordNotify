name: Discord Notify

description: Send a Discord webhook notification for a GitHub Actions job.

inputs:
  webhook_url:
    description: Discord webhook URL.
    required: true
  status:
    description: Job status passed by the caller workflow.
    required: true
  title:
    description: Optional title override.
    required: false
    default: ""
  message:
    description: Optional extra message appended to the notification.
    required: false
    default: ""
  version:
    description: Version number to include in the Discord notification.
    required: false
    default: ""
  sharepoint_link:
    description: SharePoint URL to include in the Discord notification.
    required: false
    default: ""
  message_only:
    description: Deprecated. The action now always sends the standardized version message.
    required: false
    default: "false"
  username:
    description: Optional webhook username override.
    required: false
    default: "GitHub Actions"

runs:
  using: node20
  main: index.js

name: Discord Notify

description: Send a Discord webhook notification for a GitHub Actions job.

inputs:
  webhook_url:
    description: Discord webhook URL.
    required: true
  status:
    description: Job status passed by the caller workflow.
    required: true
  title:
    description: Optional title override.
    required: false
    default: ""
  message:
    description: Optional extra message appended to the notification.
    required: false
    default: ""
  username:
    description: Optional webhook username override.
    required: false
    default: "GitHub Actions"

runs:
  using: composite
  steps:
    - name: Send Discord notification
      shell: bash
      env:
        INPUT_WEBHOOK_URL: ${{ inputs.webhook_url }}
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_USERNAME: ${{ inputs.username }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
      run: |
        $status = ([string]$env:INPUT_STATUS).Trim().ToLowerInvariant()
        $title = ([string]$env:INPUT_TITLE).Trim()
        $message = ([string]$env:INPUT_MESSAGE).Trim()
        $branch = ([string]$env:GITHUB_REF_NAME).Trim()

        if ([string]::IsNullOrWhiteSpace($branch)) {
          $branch = 'main'
        }

        if ([string]::IsNullOrWhiteSpace($title)) {
          $title = $env:GITHUB_WORKFLOW
        }

        $color = switch ($status) {
          'success' { 3066993 }
          'failure' { 15158332 }
          'cancelled' { 9807270 }
          default { 3447003 }
        }

        $runUrl = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"
        $descriptionLines = @(
          "Status: $status",
          "Repository: $($env:GITHUB_REPOSITORY)",
          "Branch: $branch",
          "Actor: $($env:GITHUB_ACTOR)",
          "Event: $($env:GITHUB_EVENT_NAME)"
        )

        if (-not [string]::IsNullOrWhiteSpace($message)) {
          $descriptionLines += ""
          $descriptionLines += $message
        }

        $payload = @{
          username = $env:INPUT_USERNAME
          embeds = @(
            @{
              title = $title
              description = ($descriptionLines -join "`n")
              color = $color
              url = $runUrl
            }
          )
        } | ConvertTo-Json -Depth 5

        Invoke-RestMethod -Method POST -Uri $env:INPUT_WEBHOOK_URL -ContentType 'application/json' -Body $payload | Out-Null

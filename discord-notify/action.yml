name: Discord Notify

description: Send a Discord webhook notification for a GitHub Actions job.

inputs:
  webhook_url:
    description: Discord webhook URL.
    required: true
  status:
    description: Job status passed by the caller workflow.
    required: true
  title:
    description: Optional title override.
    required: false
    default: ""
  message:
    description: Optional extra message appended to the notification.
    required: false
    default: ""
  username:
    description: Optional webhook username override.
    required: false
    default: "GitHub Actions"

runs:
  using: node20
  main: index.js
